name: Build & Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        sketch:
          - { dir: base,          ino: base          }
          - { dir: temperature,   ino: temperature   }
          - { dir: accelerometer, ino: accelerometer }
          - { dir: ultrasonic,    ino: ultrasonic    }
          - { dir: test,          ino: test          }

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh

      - name: Add ESP32 board index
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index

      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "PubSubClient"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "DHT sensor library for ESPx"
          arduino-cli lib install "Adafruit MPU6050"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "NewPing"

      - name: Compile ${{ matrix.sketch.ino }}
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32doit-devkit-v1 \
            --output-dir build \
            ${{ matrix.sketch.dir }}

      - name: Rename .bin with sketch name + tag
        run: |
          mv build/${{ matrix.sketch.ino }}.ino.bin \
             build/${{ matrix.sketch.ino }}-${{ github.ref_name }}.bin

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.sketch.ino }}-${{ github.ref_name }}.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
